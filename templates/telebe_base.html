<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}Kabinet{% endblock %} — E-Jurnal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f8;color:#1a1a2e;font-size:15px}
a{text-decoration:none;color:inherit}
nav{background:linear-gradient(90deg,#1a237e,#283593);color:#fff;padding:0 20px;display:flex;align-items:center;height:52px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px #0003}
.logo{font-size:16px;font-weight:700;margin-right:20px;white-space:nowrap}
.nav-links{display:flex;gap:2px;flex:1}
.nl{padding:5px 12px;border-radius:6px;font-size:13px;font-weight:500;color:rgba(255,255,255,.75);transition:.13s}
.nl:hover,.nl.akt{background:rgba(255,255,255,.15);color:#fff}
.nav-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.nav-ad{font-size:12px;opacity:.8;white-space:nowrap}
.cix{padding:4px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.3);font-size:12px;color:#fff;background:transparent;cursor:pointer}
main{max-width:1100px;margin:22px auto;padding:0 16px}
.kart{background:#fff;border-radius:12px;box-shadow:0 1px 5px #0001;padding:20px 22px;margin-bottom:16px}
.kb{font-size:16px;font-weight:700;color:#1a237e;margin-bottom:14px;display:flex;align-items:center;gap:7px}
input,select{font-size:13.5px;padding:7px 10px;border:1.5px solid #dde2f0;border-radius:7px;background:#fff;color:#1a1a2e;outline:none;transition:.13s;width:100%}
input:focus,select:focus{border-color:#3949ab;box-shadow:0 0 0 3px #3949ab12}
.btn{padding:7px 15px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.13s;display:inline-flex;align-items:center;gap:4px}
.btn-p{background:#1a237e;color:#fff}.btn-s{background:#eef0fb;color:#1a237e;border:1.5px solid #c5cae9}
.tw{overflow-x:auto;border-radius:8px;border:1.5px solid #e8eaf6}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f0f2ff;color:#3949ab;font-weight:700;padding:8px 10px;text-align:left;border-bottom:2px solid #c5cae9}
td{padding:7px 10px;border-bottom:1px solid #f0f2f7;vertical-align:middle}
tr:last-child td{border-bottom:none}
.bdg{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11.5px;font-weight:700}
.bdg-y{background:#e8f5e9;color:#2e7d32}.bdg-r{background:#ffebee;color:#c62828}.bdg-b{background:#e3f2fd;color:#1565c0}
.alt{padding:10px 14px;border-radius:7px;margin-bottom:12px;font-size:13px}
.alt-x{background:#ffebee;color:#c62828;border-left:4px solid #e53935}
.alt-ok{background:#e8f5e9;color:#2e7d32;border-left:4px solid #43a047}
.prog-wrap{background:#e8eaf6;border-radius:20px;height:8px;overflow:hidden;margin-top:4px}
.prog-bar{height:100%;border-radius:20px}
.fld{margin-bottom:14px}.fld label{display:block;font-size:12px;font-weight:700;color:#666;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
</style>
{% block head %}{% endblock %}
</head>
<body>
<nav>
  <div class="logo">📚 E-Jurnal</div>
  <div class="nav-links">
    <a href="/kabinet" class="nl {% if request.path=='/kabinet' %}akt{% endif %}">🏠 Kabinet</a>
    <a href="/kabinet/profil" class="nl {% if '/profil' in request.path %}akt{% endif %}">👤 Profil</a>
  </div>
  <div class="nav-r">
    <span class="nav-ad">🎓 {{ session.telebe_ad }}</span>
    <a href="/cixis"><button class="cix">Çıxış</button></a>
  </div>
</nav>
<main>{% block content %}{% endblock %}</main>
{% block scripts %}{% endblock %}
</body>
</html>
